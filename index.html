<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background Remover</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="card">
    <header class="hero">
      <h1>Background Remover</h1>
      <p>Upload a photo and get a transparent PNG.</p>
    </header>

    <section class="status-bar">
      <span id="serverStatus" class="pill loading">Checking server…</span>
      <span id="modelStatus" class="pill loading">Loading model…</span>
    </section>

    <section id="message" class="message hidden"></section>

    <label id="dropZone" class="drop-zone">
      <input id="fileInput" type="file" accept="image/*" />
      <div class="drop-icon">📷</div>
      <div class="drop-title">Tap to upload or drag & drop</div>
      <div class="drop-subtitle">JPG, PNG, WEBP, BMP, GIF up to 10MB</div>
    </label>

    <section id="loadingBox" class="loading hidden">
      <div class="spinner"></div>
      <p>Processing image…</p>
    </section>

    <section id="preview" class="preview hidden">
      <article class="panel">
        <h2>Original</h2>
        <img id="originalImg" alt="Original preview" />
      </article>
      <article class="panel">
        <h2>Result</h2>
        <img id="resultImg" alt="Background removed result" />
      </article>
    </section>

    <div class="actions">
      <button id="downloadBtn" class="btn primary hidden">Download PNG</button>
      <button id="resetBtn" class="btn secondary hidden" type="button">Upload Another</button>
    </div>

    <footer class="footer">
      <a href="/health" target="_blank" rel="noreferrer">Health check</a>
    </footer>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
